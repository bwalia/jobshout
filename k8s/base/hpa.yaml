apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jobshout-api-hpa
  namespace: jobshout
  labels:
    app.kubernetes.io/name: jobshout-api
    app.kubernetes.io/part-of: jobshout
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jobshout-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: python-runtime-hpa
  namespace: jobshout
  labels:
    app.kubernetes.io/name: python-runtime
    app.kubernetes.io/part-of: jobshout
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: python-runtime
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
