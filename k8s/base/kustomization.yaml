apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jobshout

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres-deployment.yaml
  - redis-deployment.yaml
  - ollama-deployment.yaml
  - api-deployment.yaml
  - python-runtime-deployment.yaml
  - web-deployment.yaml
  - ingress.yaml
  - hpa.yaml
  - monitoring.yaml
  - grafana-dashboard.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
