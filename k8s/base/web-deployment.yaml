apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobshout-web
  namespace: jobshout
  labels:
    app.kubernetes.io/name: jobshout-web
    app.kubernetes.io/part-of: jobshout
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jobshout-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jobshout-web
    spec:
      containers:
        - name: web
          image: jobshout/web:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://jobshout-api:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jobshout-web
  namespace: jobshout
  labels:
    app.kubernetes.io/name: jobshout-web
    app.kubernetes.io/part-of: jobshout
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: jobshout-web
