apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobshout-api
  namespace: jobshout
  labels:
    app.kubernetes.io/name: jobshout-api
    app.kubernetes.io/part-of: jobshout
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: jobshout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jobshout-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: jobshout/server:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: jobshout-config
            - secretRef:
                name: jobshout-secrets
          env:
            - name: DATABASE_URL
              value: "postgres://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)?sslmode=$(DATABASE_SSLMODE)"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: jobshout-api
  namespace: jobshout
  labels:
    app.kubernetes.io/name: jobshout-api
    app.kubernetes.io/part-of: jobshout
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: jobshout-api
