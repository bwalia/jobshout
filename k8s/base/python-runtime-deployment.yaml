apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-runtime
  namespace: jobshout
  labels:
    app.kubernetes.io/name: python-runtime
    app.kubernetes.io/part-of: jobshout
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: python-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: python-runtime
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: python-runtime
          image: jobshout/python-sidecar:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: jobshout-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_DEFAULT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: jobshout-config
                  key: OLLAMA_DEFAULT_MODEL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jobshout-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: jobshout-config
                  key: OPENAI_BASE_URL
            - name: OPENAI_DEFAULT_MODEL
              valueFrom:
                configMapKeyRef:
                  name: jobshout-config
                  key: OPENAI_DEFAULT_MODEL
            - name: SIDECAR_SECRET
              valueFrom:
                secretKeyRef:
                  name: jobshout-secrets
                  key: PYTHON_SIDECAR_SECRET
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: python-runtime
  namespace: jobshout
  labels:
    app.kubernetes.io/name: python-runtime
    app.kubernetes.io/part-of: jobshout
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app.kubernetes.io/name: python-runtime
