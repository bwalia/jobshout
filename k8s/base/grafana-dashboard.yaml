apiVersion: v1
kind: ConfigMap
metadata:
  name: jobshout-grafana-dashboard
  namespace: jobshout
  labels:
    app.kubernetes.io/part-of: jobshout
    grafana_dashboard: "1"
data:
  jobshout-overview.json: |
    {
      "dashboard": {
        "title": "JobShout Platform Overview",
        "tags": ["jobshout"],
        "timezone": "browser",
        "refresh": "10s",
        "panels": [
          {
            "title": "API Request Rate",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "targets": [
              {
                "expr": "sum(rate(http_requests_total{service=\"jobshout-api\"}[5m])) by (code)",
                "legendFormat": "{{code}}"
              }
            ]
          },
          {
            "title": "API Latency (p95)",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=\"jobshout-api\"}[5m])) by (le))",
                "legendFormat": "p95"
              }
            ]
          },
          {
            "title": "LLM Execution Duration",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
            "targets": [
              {
                "expr": "histogram_quantile(0.95, sum(rate(llm_execution_duration_seconds_bucket[5m])) by (le, engine))",
                "legendFormat": "{{engine}} p95"
              }
            ]
          },
          {
            "title": "Active Workflow Runs",
            "type": "stat",
            "gridPos": {"h": 8, "w": 6, "x": 12, "y": 8},
            "targets": [
              {
                "expr": "sum(workflow_runs_active)",
                "legendFormat": "Active"
              }
            ]
          },
          {
            "title": "Pod CPU Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 6, "x": 18, "y": 8},
            "targets": [
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"jobshout\"}[5m])) by (pod)",
                "legendFormat": "{{pod}}"
              }
            ]
          },
          {
            "title": "Pod Memory Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
            "targets": [
              {
                "expr": "sum(container_memory_working_set_bytes{namespace=\"jobshout\"}) by (pod) / 1024 / 1024",
                "legendFormat": "{{pod}} (MiB)"
              }
            ]
          },
          {
            "title": "HPA Replica Count",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
            "targets": [
              {
                "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"jobshout\"}",
                "legendFormat": "{{horizontalpodautoscaler}}"
              }
            ]
          }
        ]
      }
    }
