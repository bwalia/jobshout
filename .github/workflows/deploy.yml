name: Deploy JobShout

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-jobshout
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy docker-compose stack
    runs-on: [self-hosted, int]

    env:
      DEPLOY_DIR: /home/bwalia/deployments/jobshout
      HOST_IP: 192.168.1.193
      # Host port mappings — chosen to avoid conflicts on the runner VM.
      UI_HOST_PORT: "3001"
      SERVER_HOST_PORT: "8190"
      POSTGRES_HOST_PORT: "5433"
      MINIO_API_HOST_PORT: "9100"
      MINIO_CONSOLE_HOST_PORT: "9101"
      OLLAMA_HOST_PORT: "11440"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner context
        run: |
          set -e
          echo "Runner: $(hostname) – user $(whoami)"
          docker --version
          docker compose version

      - name: Sync repository to deploy directory
        run: |
          set -e
          mkdir -p "$DEPLOY_DIR"
          # rsync preserves the stack state (e.g. .env secrets) across deploys
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude 'server/bin' \
            --exclude '.dev-logs' \
            ./ "$DEPLOY_DIR/"

      - name: Render .env for deploy
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          set -e
          cat > .env <<EOF
          # Generated by GH Actions deploy workflow
          UI_HOST_PORT=${UI_HOST_PORT}
          SERVER_HOST_PORT=${SERVER_HOST_PORT}
          POSTGRES_HOST_PORT=${POSTGRES_HOST_PORT}
          MINIO_API_HOST_PORT=${MINIO_API_HOST_PORT}
          MINIO_CONSOLE_HOST_PORT=${MINIO_CONSOLE_HOST_PORT}
          OLLAMA_HOST_PORT=${OLLAMA_HOST_PORT}

          POSTGRES_USER=jobshout
          POSTGRES_PASSWORD=jobshout
          POSTGRES_DB=jobshout
          DATABASE_URL=postgres://jobshout:jobshout@postgres:5432/jobshout?sslmode=disable

          JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-dev-jwt-secret-change-me-please-32chars' }}
          JWT_EXPIRY_MINUTES=15
          JWT_REFRESH_EXPIRY_DAYS=7

          MINIO_ENDPOINT=minio:9000
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          MINIO_USE_SSL=false
          MINIO_BUCKET_AVATARS=avatars
          MINIO_BUCKET_KNOWLEDGE=knowledge

          SERVER_PORT=:8080
          CORS_ORIGINS=http://localhost:${UI_HOST_PORT},http://${HOST_IP}:${UI_HOST_PORT}

          NEXT_PUBLIC_API_URL=http://${HOST_IP}:${SERVER_HOST_PORT}
          NEXT_PUBLIC_WS_URL=ws://${HOST_IP}:${SERVER_HOST_PORT}

          LLM_PROVIDER=ollama
          OLLAMA_BASE_URL=http://ollama:11434
          OLLAMA_DEFAULT_MODEL=tinyllama
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL=https://api.openai.com/v1
          OPENAI_DEFAULT_MODEL=gpt-4o-mini
          PYTHON_SIDECAR_URL=http://python-sidecar:8001
          PYTHON_SIDECAR_SECRET=${{ secrets.PYTHON_SIDECAR_SECRET || 'ci-dev-sidecar-secret' }}
          EOF
          chmod 600 .env

      - name: Build images
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose -p jobshout build --pull

      - name: Bring stack up
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker compose -p jobshout up -d --remove-orphans

      - name: Wait for health
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          set -e
          echo "Waiting up to 3 minutes for services to become healthy..."
          for i in $(seq 1 36); do
            unhealthy="$(docker compose -p jobshout ps --format json \
              | (command -v jq >/dev/null && jq -r 'select(.Health != "" and .Health != "healthy") | .Name' \
                 || grep -oE '"Health":"[^"]+"[^}]*"Name":"[^"]+"' | grep -v '"healthy"' | grep -oE '"Name":"[^"]+"' | cut -d'"' -f4) \
              || true)"
            if [ -z "$unhealthy" ]; then
              echo "All healthchecked services are healthy."
              break
            fi
            echo "Still waiting on: $unhealthy"
            sleep 5
          done
          docker compose -p jobshout ps

      - name: Smoke-test exposed ports
        run: |
          set -e
          fail=0
          check() {
            local name="$1" url="$2"
            if curl -fsS --max-time 5 "$url" -o /dev/null; then
              echo "OK   $name -> $url"
            else
              # Some ports (postgres, raw tcp) won't speak HTTP; just check TCP.
              if bash -c "</dev/tcp/${HOST_IP}/$3" 2>/dev/null; then
                echo "TCP  $name -> ${HOST_IP}:$3 open"
              else
                echo "FAIL $name -> $url"
                fail=1
              fi
            fi
          }
          check "UI"            "http://${HOST_IP}:${UI_HOST_PORT}"              "${UI_HOST_PORT}"
          check "API"           "http://${HOST_IP}:${SERVER_HOST_PORT}/health"   "${SERVER_HOST_PORT}"
          check "MinIO API"     "http://${HOST_IP}:${MINIO_API_HOST_PORT}/minio/health/ready" "${MINIO_API_HOST_PORT}"
          check "MinIO console" "http://${HOST_IP}:${MINIO_CONSOLE_HOST_PORT}"   "${MINIO_CONSOLE_HOST_PORT}"
          check "Ollama"        "http://${HOST_IP}:${OLLAMA_HOST_PORT}/"         "${OLLAMA_HOST_PORT}"
          check "Postgres"      ""                                               "${POSTGRES_HOST_PORT}"
          exit $fail

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## JobShout deployment"
            echo ""
            echo "Host: \`${HOST_IP}\`"
            echo ""
            echo "| Service | URL |"
            echo "|---|---|"
            echo "| UI | http://${HOST_IP}:${UI_HOST_PORT} |"
            echo "| API | http://${HOST_IP}:${SERVER_HOST_PORT} |"
            echo "| MinIO API | http://${HOST_IP}:${MINIO_API_HOST_PORT} |"
            echo "| MinIO console | http://${HOST_IP}:${MINIO_CONSOLE_HOST_PORT} |"
            echo "| Ollama | http://${HOST_IP}:${OLLAMA_HOST_PORT} |"
            echo "| Postgres | ${HOST_IP}:${POSTGRES_HOST_PORT} |"
          } >> "$GITHUB_STEP_SUMMARY"
